<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UT Instapoll Alert</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <header>
    <img src="../assets/icon-48.png" alt="" class="logo">
    <h1>UT Instapoll Alert</h1>
  </header>

  <section class="status-hero">
    <span id="statusDot" class="dot gray"></span>
    <div class="status-body">
      <span id="statusText" class="status-label">Checking…</span>
      <span id="statusSub" class="status-sub"></span>
    </div>
  </section>

  <hr>

  <form id="settingsForm" autocomplete="off">

    <p class="section-label">Alert me with</p>

    <div class="toggle-group">
      <label class="toggle">
        <div class="toggle-info">
          <span class="toggle-name">Desktop popup</span>
        </div>
        <input type="checkbox" id="enableNotification">
        <span class="slider"></span>
      </label>
      <label class="toggle">
        <div class="toggle-info">
          <span class="toggle-name">Sound alert</span>
        </div>
        <input type="checkbox" id="enableAudio">
        <span class="slider"></span>
      </label>
      <label class="toggle">
        <div class="toggle-info">
          <span class="toggle-name">Phone notification</span>
          <span class="toggle-sub">Free ntfy app &middot; no account needed</span>
        </div>
        <input type="checkbox" id="enablePush">
        <span class="slider"></span>
      </label>
    </div>

    <div id="ntfySection" class="ntfy-section hidden">
      <label class="field">
        <span class="field-label">Your private ntfy topic name</span>
        <input type="text" id="ntfyTopic" placeholder="e.g. my-secret-alert-123">
      </label>
      <p class="hint">
        1. Install <strong>ntfy</strong> on your phone &nbsp;&middot;&nbsp;
        2. Subscribe to this topic &nbsp;&middot;&nbsp;
        3. Test below.
      </p>
      <button type="button" id="testPushBtn" class="btn-secondary btn-full">📲 Send test notification</button>
      <p id="testPushStatus" class="push-status"></p>
    </div>

    <div id="audioActions" class="audio-actions hidden">
      <button type="button" id="armAudioBtn" class="btn-secondary">🔔 Allow sound</button>
      <button type="button" id="testChimeBtn" class="btn-secondary">▶ Test sound</button>
    </div>

    <div class="experimental-section">
      <label class="toggle">
        <div class="toggle-info">
          <span class="toggle-name">⚡ Auto-submit easy polls</span>
          <span class="toggle-sub">Instant full credit on attendance &amp; participation polls. Never touches graded questions.</span>
        </div>
        <input type="checkbox" id="enableAutoSubmit">
        <span class="slider"></span>
      </label>
    </div>

    <div class="action-row">
      <button type="submit" class="btn-primary">Save settings</button>
    </div>

    <button type="button" id="advancedToggle" class="btn-link">⚙ Advanced settings</button>
    <div id="advancedSection" class="advanced-section hidden">
      <label class="field">
        <span class="field-label">Course ID <em>(leave blank — monitors all your courses)</em></span>
        <input type="text" id="courseId" placeholder="e.g. 12345">
      </label>
      <label class="field">
        <span class="field-label">API URL pattern</span>
        <input type="text" id="apiPattern" placeholder="/api/v1/student/course/*/poll">
      </label>
    </div>

  </form>

  <script src="popup.js"></script>
</body>
</html>
